version: "3.9"

services:
  app:
    build: ./Stream
    container_name: streamlit_app
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    volumes:
      - ./Stream/save files:/app/save files
